<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTR NControl</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    footer {
      margin-top: 3rem;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover {
      color: var(--accent);
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.15s ease;
      min-width: 220px;
      justify-content: center;
    }

    .links a:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }

    .links a .arrow {
      font-size: 1.2rem;
      transition: transform 0.15s ease;
    }

    .links a:hover .arrow {
      transform: translateX(3px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HTR NControl</h1>
    <p class="tagline">Record user interactions. Generate step-by-step docs.</p>

    <div class="links">
      <a href="privacy.html">
        Privacy Policy
        <span class="arrow">→</span>
      </a>
      <a href="https://github.com/u007/how-to-recorder">
        GitHub Repository
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>
      <p>
        <a href="https://github.com/u007/how-to-recorder/blob/main/docs/privacy.md">Privacy Policy (Markdown)</a>
      </p>
    </footer>
  </div>
</body>
</html>
